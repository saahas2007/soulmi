<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <!-- House Outline Gradient: lavender top → terracotta bottom-right -->
    <linearGradient id="houseGrad" x1="50" y1="10" x2="70" y2="85" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#A89CC8" />
      <stop offset="60%" stop-color="#B0A3CF" />
      <stop offset="100%" stop-color="#D4A894" />
    </linearGradient>

    <!-- Heart Gradient: dusty rose → warm pink -->
    <linearGradient id="heartGrad" x1="38" y1="30" x2="62" y2="72" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#C9A0A0" />
      <stop offset="50%" stop-color="#CDA0A0" />
      <stop offset="100%" stop-color="#D4A894" />
    </linearGradient>

    <!-- Swoosh Gradient -->
    <linearGradient id="swooshGrad" x1="55" y1="75" x2="78" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#D4A894" />
      <stop offset="100%" stop-color="#DFBBA8" />
    </linearGradient>

    <!-- Inner Radial Glow (bright center of heart) -->
    <radialGradient id="innerGlow" cx="50%" cy="48%" r="18%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95" />
      <stop offset="50%" stop-color="#FFF5EE" stop-opacity="0.7" />
      <stop offset="100%" stop-color="#F0E8E0" stop-opacity="0" />
    </radialGradient>

    <!-- Soft background blush behind the heart -->
    <radialGradient id="blushGlow" cx="50%" cy="50%" r="30%">
      <stop offset="0%" stop-color="#F5D5CC" stop-opacity="0.35" />
      <stop offset="100%" stop-color="#F5D5CC" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Subtle blush glow behind heart area -->
  <circle cx="50" cy="50" r="28" fill="url(#blushGlow)" />

  <!-- House Outline: rounded home shape, open at bottom-right -->
  <!-- Starts from bottom-left, goes up left side, across roof peak, down right side, stops before bottom-right corner -->
  <path d="M 28 78
           C 22 78, 20 74, 20 68
           L 20 40
           C 20 36, 22 32, 26 28
           L 44 14
           C 47 11.5, 53 11.5, 56 14
           L 74 28
           C 78 32, 80 36, 80 40
           L 80 68
           C 80 74, 78 78, 72 78
           L 60 78"
        stroke="url(#houseGrad)"
        stroke-width="5.5"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none" />

  <!-- Swoosh / ribbon tail exiting bottom-right -->
  <path d="M 60 78
           C 56 78, 54 76, 56 72
           C 58 68, 66 74, 72 78"
        stroke="url(#swooshGrad)"
        stroke-width="4.5"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none" />

  <!-- Heart shape centered inside the house -->
  <!-- Classic heart: two lobes at top, point at bottom -->
  <path d="M 50 66
           C 40 60, 32 50, 34 42
           C 35 36, 40 33, 44 33
           C 47 33, 49 36, 50 39
           C 51 36, 53 33, 56 33
           C 60 33, 65 36, 66 42
           C 68 50, 60 60, 50 66 Z"
        fill="url(#heartGrad)"
        stroke="none"
        opacity="0.85" />

  <!-- Bright glow in center of heart -->
  <circle cx="50" cy="46" r="14" fill="url(#innerGlow)" />
</svg>
