<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <!-- House Outline Gradient -->
    <linearGradient id="houseGrad" x1="25" y1="15" x2="75" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#9C97C4" />
      <stop offset="100%" stop-color="#7A75AA" />
    </linearGradient>
    
    <!-- Heart & Ribbon Loop Gradient -->
    <linearGradient id="heartGrad" x1="35" y1="35" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#B4A8D3" />
      <stop offset="40%" stop-color="#D98F76" />
      <stop offset="100%" stop-color="#EAA68F" />
    </linearGradient>

    <!-- Inner Radial Glow -->
    <radialGradient id="innerGlow" cx="50%" cy="53%" r="32%">
      <stop offset="0%" stop-color="#FFFDF7" stop-opacity="0.95" />
      <stop offset="40%" stop-color="#FFF2E9" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#F4F0E6" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Soft Background Radial Glow inside the house -->
  <circle cx="50" cy="53" r="28" fill="url(#innerGlow)" />

  <!-- House Outline (thick rounded stroke, open at bottom right) -->
  <path d="M 54 78 
           H 32 
           C 25 78, 21 74, 21 67 
           V 42 
           C 21 34, 26 29, 33 24 
           L 46 16
           C 48.5 14.5, 51.5 14.5, 54 16
           L 67 24
           C 74 29, 79 34, 79 42
           V 68
           C 79 70, 78 71, 78 71" 
        stroke="url(#houseGrad)" 
        stroke-width="5.5" 
        stroke-linecap="round" 
        stroke-linejoin="round" 
        fill="none" />

  <!-- Heart and Ribbon Loop (continuous line) -->
  <path d="M 47.5 68 
           C 38 63, 31.5 51, 37.5 39.5
           C 41.5 31.5, 48.5 33.5, 50 40
           C 51.5 33.5, 58.5 31.5, 62.5 39.5
           C 68.5 51, 62 63, 52.5 68
           C 47.5 73, 49.5 78, 56 78
           C 62 78, 71.5 78, 78 78" 
        stroke="url(#heartGrad)" 
        stroke-width="5" 
        stroke-linecap="round" 
        stroke-linejoin="round" 
        fill="none" />
</svg>
