<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <!-- House outline gradient: lavender top → soft peach bottom-right -->
    <linearGradient id="houseGrad" x1="100" y1="20" x2="140" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#9B93BF" />
      <stop offset="55%" stop-color="#A89CC4" />
      <stop offset="100%" stop-color="#CFAC9E" />
    </linearGradient>

    <!-- Heart stroke gradient: dusty mauve/rose -->
    <linearGradient id="heartGrad" x1="75" y1="55" x2="125" y2="130" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#B89AAA" />
      <stop offset="100%" stop-color="#C9A09E" />
    </linearGradient>

    <!-- Swoosh gradient: peach/terracotta -->
    <linearGradient id="swooshGrad" x1="120" y1="145" x2="155" y2="155" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#CFAC9E" />
      <stop offset="100%" stop-color="#D9B8A8" />
    </linearGradient>

    <!-- Inner radial glow in center of heart -->
    <radialGradient id="heartGlow" cx="50%" cy="52%" r="22%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95" />
      <stop offset="45%" stop-color="#FDF0EA" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#F0E0D8" stop-opacity="0" />
    </radialGradient>

    <!-- Subtle pink blush behind heart -->
    <radialGradient id="blushGlow" cx="50%" cy="55%" r="25%">
      <stop offset="0%" stop-color="#F0D0CC" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#F0D0CC" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Subtle blush behind heart area -->
  <circle cx="100" cy="100" r="45" fill="url(#blushGlow)" />

  <!-- 
    House outline: flat-topped pentagon shape with heavily rounded corners.
    - Wide angled roof (not a sharp point)
    - Vertical sides
    - Flat bottom with rounded corners
    - Open at bottom-right where swoosh exits
    Path goes: bottom-left → up left side → roof left → roof peak → roof right → down right side → stops before bottom-right
  -->
  <path d="
    M 58 152
    C 42 152, 36 144, 36 132
    L 36 82
    C 36 76, 38 72, 42 68
    L 88 36
    C 94 30, 106 30, 112 36
    L 158 68
    C 162 72, 164 76, 164 82
    L 164 132
    C 164 144, 158 152, 142 152
    L 122 152"
    stroke="url(#houseGrad)"
    stroke-width="10"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none" />

  <!-- Swoosh / ribbon exiting bottom-right of house -->
  <path d="
    M 122 152
    C 114 150, 112 144, 118 138
    C 124 132, 138 142, 148 150"
    stroke="url(#swooshGrad)"
    stroke-width="8"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none" />

  <!-- 
    Heart: outlined (stroke only), with overlapping lobes at top.
    The heart is drawn as a continuous path — two arcs for the lobes meeting
    at a crossing point at the top-center, coming down to a point at the bottom.
  -->
  <!-- Left lobe of heart -->
  <path d="
    M 100 130
    C 78 118, 62 100, 65 84
    C 67 72, 76 65, 86 66
    C 93 67, 97 72, 100 80"
    stroke="url(#heartGrad)"
    stroke-width="8.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none" />

  <!-- Right lobe of heart -->
  <path d="
    M 100 80
    C 103 72, 107 67, 114 66
    C 124 65, 133 72, 135 84
    C 138 100, 122 118, 100 130"
    stroke="url(#heartGrad)"
    stroke-width="8.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none" />

  <!-- Bright glow in center of heart -->
  <circle cx="100" cy="98" r="28" fill="url(#heartGlow)" />
</svg>
