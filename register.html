<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Join SoulMi | Register or Sign In</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Nunito+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- ======= NAVBAR ======= -->
    <header id="navbar">
        <div class="container">
            <div class="nav-inner">
                <a href="index.html" class="nav-logo">
                    <img src="images/logo.svg" alt="SoulMi Logo" class="nav-logo-icon">
                    <span class="nav-logo-text">SoulMi</span>
                </a>
                <nav class="nav-links">
                    <a href="index.html">Home</a>
                    <a href="about.html">About</a>
                    <a href="therapists.html">Therapists</a>
                    <a href="resources.html">Resources</a>
                    <a href="community.html">Community</a>
                </nav>
                <div class="nav-actions">
                    <a href="tel:9152987821" class="crisis-link">Crisis Help</a>
                    <div class="theme-toggle" id="theme-toggle" title="Toggle Zen Mode">
                        <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                        <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                    </div>
                </div>
                <button class="nav-hamburger" id="nav-hamburger" aria-label="Open menu">
                    <span></span><span></span><span></span>
                </button>
            </div>
        </div>
    </header>

    <div class="nav-mobile-menu" id="nav-mobile-menu">
        <button class="nav-mobile-close" id="nav-mobile-close" aria-label="Close menu">×</button>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="therapists.html">Therapists</a>
        <a href="resources.html">Resources</a>
        <a href="community.html">Community</a>
    </div>

    <!-- ======= AUTH PAGE ======= -->
    <div class="auth-page">
        <!-- Background blobs -->
        <div style="position:fixed; top:-10%; right:-5%; width:480px; height:480px; background:var(--lavender); border-radius:50%; filter:blur(90px); opacity:0.18; pointer-events:none; z-index:0;"></div>
        <div style="position:fixed; bottom:-5%; left:-8%; width:360px; height:360px; background:var(--terracotta); border-radius:50%; filter:blur(80px); opacity:0.14; pointer-events:none; z-index:0;"></div>

        <div class="auth-card reveal">
            <div class="auth-logo">
                <img src="images/logo.svg" alt="SoulMi Logo" class="auth-logo-icon" style="width: 52px; height: 52px;">
            </div>

            <h2>Welcome to SoulMi</h2>
            <p>Your space is ready. Let's get you in.</p>

            <div class="auth-tabs">
                <button class="auth-tab active" data-tab="register" id="tab-register">Create Account</button>
                <button class="auth-tab" data-tab="login" id="tab-login">Sign In</button>
            </div>

            <!-- Register Form -->
            <form id="register-form" class="auth-form" action="#" method="POST" novalidate>
                <div class="form-group">
                    <label for="reg-name">Full Name</label>
                    <input type="text" id="reg-name" name="name" placeholder="Your name" autocomplete="name" required>
                </div>
                <div class="form-group">
                    <label for="reg-email">Email Address</label>
                    <input type="email" id="reg-email" name="email" placeholder="you@example.com" autocomplete="email" required>
                </div>
                <div class="form-group">
                    <label for="reg-password">Password</label>
                    <input type="password" id="reg-password" name="password" placeholder="Create a strong password" autocomplete="new-password" required>
                </div>
                <div class="form-group">
                    <label for="reg-intention">What brings you to SoulMi? <span style="color:var(--text-muted); font-weight:400;">(optional)</span></label>
                    <select id="reg-intention" name="intention">
                        <option value="">I'd rather not say right now</option>
                        <option value="anxiety">Managing anxiety or stress</option>
                        <option value="community">Finding community & connection</option>
                        <option value="therapy">Connecting with a therapist</option>
                        <option value="resources">Exploring resources & tools</option>
                        <option value="curiosity">Just exploring</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Begin My Journey</button>
                <div class="auth-divider"><span>or continue with</span></div>
                <button type="button" class="btn btn-ghost" style="width:100%;" onclick="return false;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                    Continue with Google
                </button>
            </form>

            <!-- Login Form (hidden by default) -->
            <form id="login-form" class="auth-form" action="#" method="POST" novalidate style="display:none;">
                <div class="form-group">
                    <label for="login-email">Email Address</label>
                    <input type="email" id="login-email" name="email" placeholder="you@example.com" autocomplete="email" required>
                </div>
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" name="password" placeholder="Your password" autocomplete="current-password" required>
                </div>
                <div style="text-align:right; margin-top:-6px;">
                    <a href="#" style="font-size:0.85rem; color:var(--lavender-dark); font-family:var(--font-head); font-weight:600;">Forgot password?</a>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Welcome Back</button>
                <div class="auth-divider"><span>or continue with</span></div>
                <button type="button" class="btn btn-ghost" style="width:100%;" onclick="return false;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                    Continue with Google
                </button>
            </form>

            <div class="auth-links">
                <p id="auth-switch-text">Already have an account? <a href="#" id="auth-switch-link">Sign in here</a></p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
